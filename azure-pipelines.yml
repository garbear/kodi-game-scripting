        dpkg -s mesa-common-dev || sudo apt install -y mesa-common-dev

        # vecx
        dpkg -s mesa-common-dev || sudo apt install -y mesa-common-dev

        # wolfenstein3d
        #dpkg -s libsdl1.2-dev || sudo apt install -y libsdl1.2-dev

        # yabasanshiro
        dpkg -s mesa-common-dev || sudo apt install -y mesa-common-dev
      addons:
        - all
